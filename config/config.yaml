# Speaker Verification System Configuration

# Data Configuration
data:
  raw_path: "./data/raw"
  processed_path: "./data/processed"
  augmented_path: "./data/augmented"
  sample_rate: 16000
  duration: 3.0  # seconds
  n_fft: 512
  hop_length: 160
  n_mels: 80
  f_min: 50
  f_max: 7600

# Augmentation Configuration
augmentation:
  enabled: true
  noise_snr: [0, 10, 20]  # dB levels
  musan_path: "./data/musan"  # MUSAN dataset path
  prob: 0.5

# Model Configuration
model:
  xvector:
    input_dim: 80  # MFCC/Mel dimension
    tdnn_dim: 1024
    num_speakers: 5994  # VoxCeleb
    embeddings_dim: 512
    
  ecapa_tdnn:
    input_dim: 80
    num_channels: 1024
    kernel_size: 5
    dilations: [1, 2, 3, 4]
    num_speakers: 5994
    embeddings_dim: 192

# Training Configuration
training:
  batch_size: 64
  num_epochs: 100
  learning_rate: 0.01
  weight_decay: 0.0001
  loss_type: "aamsoftmax"  # Options: "crossentropy", "aamsoftmax"
  margin: 0.2  # AAM-Softmax margin
  scale: 30.0  # AAM-Softmax scale
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping: true
  patience: 10
  gradient_clip: 5.0
  device: "cuda"

# Evaluation Configuration
evaluation:
  eer_threshold_range: [0.0, 1.0]
  num_thresholds: 1000
  backend: "cosine"  # Similarity backend

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  model_type: "ecapa_tdnn"  # Model to use in API

# Logging
logging:
  level: "INFO"
  log_file: "./logs/speaker_verification.log"
  tensorboard_dir: "./logs/tensorboard"

# Random Seed
seed: 42
