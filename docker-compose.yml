version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speaker-verification-api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_TYPE=ecapa_tdnn
    restart: unless-stopped
    networks:
      - speaker-verification

networks:
  speaker-verification:
    driver: bridge
